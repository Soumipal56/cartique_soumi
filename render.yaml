services:
  # Backend Web Service
  - type: web
    name: cartique-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    rootDirectory: Backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # Frontend Static Site
  - type: web
    name: cartique-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDirectory: Frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: cartique-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
