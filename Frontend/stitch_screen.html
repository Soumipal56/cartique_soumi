<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AUREUM - Registration</title>

                        "on-background": "#e5e2e1",
                        "on-primary-fixed": "#251a00",

                        "outline-variant": "#4f4633",
                        "error": "#ffb4ab",

                        "on-secondary-fixed-variant": "#474746",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary-fixed": "#e5e2e1",
                        "on-secondary-fixed": "#1b1b1c",
                        "surface": "#131313",
                        "secondary-fixed-dim": "#c8c6c5",
                        "tertiary-fixed": "#e4e2e1",
                        "tertiary-container": "#bdbbbb",
                        "on-surface-variant": "#d3c5ac",
                        "background": "#131313",
                        "on-surface": "#e5e2e1",
                        "on-primary-fixed-variant": "#5a4300",
                        "on-primary": "#3f2e00",
                        "surface-bright": "#3a3939",

                        "on-tertiary-fixed-variant": "#474747",
                        "primary-fixed": "#ffdf9a",
                        "tertiary": "#d9d7d6",
                        "secondary-container": "#474746",
                        "on-error-container": "#ffdad6",
                        "surface-container": "#201f1f",
                        "outline": "#9b8f79",
                        "on-tertiary": "#303030",
                        "on-secondary": "#303030",
                        "primary-fixed-dim": "#f7be1d",
                        "surface-tint": "#f7be1d",
                        "on-tertiary-container": "#4b4b4b",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed-dim": "#c8c6c6",
                        "surface-container-highest": "#353534",
                        "surface-container-low": "#1c1b1b",
                        "on-tertiary-fixed": "#1b1c1c",
                        "inverse-primary": "#785a00",
                        "inverse-surface": "#e5e2e1",
                        "secondary": "#c8c6c5",

                    "borderRadius": {
                        "DEFAULT": "0.125rem",

                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "margin-desktop": "64px",
                        "container-max": "1200px",

                        "section-gap": "120px",

                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],

                        "body-md": ["Inter"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Shadows for depth as per Style Guidance */
        .ambient-shadow {
            box-shadow: 0 0 40px -10px rgba(0, 0, 0, 0.5);
        }
        
        /* Interactive Depth for inputs */
        .input-glow:focus {
            box-shadow: inset 0 0 0 1px rgba(234, 179, 8, 0.2);
            border-color: #EAB308;
            outline: none;
        }

        /* Custom Checkbox styles */
        .custom-checkbox:checked {
            background-color: #EAB308;
            border-color: #EAB308;
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='black' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Supressed TopAppBar because this is a Transactional/Registration page -->
<main class="flex-grow flex items-center justify-center py-section-gap px-margin-mobile md:px-margin-desktop">
<!-- Registration Card Container -->
<div class="w-full max-w-[480px] bg-[#1E1E1E] rounded-xl ambient-shadow p-8 md:p-12 relative overflow-hidden">
<!-- Minimalist Progress Indicator (Thin golden line at top) -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-surface-container-high">
<div class="h-full w-1/3 bg-[#EAB308] transition-all duration-500 ease-in-out"></div>
</div>
<!-- Header Section -->
<div class="text-center mb-10">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg mb-4">Create Account</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Join AUREUM and unlock a world of prestigious opportunities.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="fullName">Full Name</label>
<input class="w-full bg-surface-container-low border-0 border-b border-surface-container-highest text-on-surface placeholder-on-secondary-container/50 px-4 py-3 rounded-t-DEFAULT transition-all duration-300 input-glow focus:ring-0" id="fullName" name="fullName" placeholder="John Doe" required="" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<input class="w-full bg-surface-container-low border-0 border-b border-surface-container-highest text-on-surface placeholder-on-secondary-container/50 px-4 py-3 rounded-t-DEFAULT transition-all duration-300 input-glow focus:ring-0" id="email" name="email" placeholder="john@example.com" required="" type="email"/>
</div>
<!-- Contact Number Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="phone">Contact Number</label>
<input class="w-full bg-surface-container-low border-0 border-b border-surface-container-highest text-on-surface placeholder-on-secondary-container/50 px-4 py-3 rounded-t-DEFAULT transition-all duration-300 input-glow focus:ring-0" id="phone" name="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<!-- Password Field -->
<div class="space-y-2 relative">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<input class="w-full bg-surface-container-low border-0 border-b border-surface-container-highest text-on-surface placeholder-on-secondary-container/50 px-4 py-3 rounded-t-DEFAULT transition-all duration-300 input-glow focus:ring-0 pr-10" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle Password Visibility" class="absolute right-3 top-9 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Seller Checkbox -->
<div class="flex items-center mt-8 p-4 bg-surface-container-low rounded-lg border border-surface-container-highest">
<input class="custom-checkbox w-5 h-5 rounded-[4px] border-outline-variant bg-[#2D2D2D] text-[#EAB308] focus:ring-0 focus:ring-offset-0 cursor-pointer transition-colors duration-200" id="sellerCheckbox" name="isSeller" type="checkbox"/>
<label class="ml-3 block font-body-md text-body-md text-on-surface cursor-pointer select-none" for="sellerCheckbox">
                        Register as a Seller
                    </label>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full bg-[#EAB308] text-black font-headline-md text-headline-md py-4 rounded-lg hover:bg-primary-fixed-dim transition-colors duration-300 active:scale-[0.98] shadow-[0_0_15px_rgba(234,179,8,0.3)] hover:shadow-[0_0_25px_rgba(234,179,8,0.5)]" type="submit">
                        Create Account
                    </button>
</div>
</form>
<!-- Login Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="text-[#EAB308] hover:text-primary-fixed transition-colors font-medium ml-1" href="#">Log In</a>
</p>
</div>
</div>
</main>
<!-- Footer Component from JSON -->
<footer class="bg-surface-dim dark:bg-surface-dim border-t border-surface-container-highest dark:border-surface-container-highest mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-gutter gap-4 max-w-container-max mx-auto">
<div class="text-primary font-bold text-label-sm font-label-sm uppercase tracking-wider">
                AUREUM
            </div>
<nav class="flex flex-wrap justify-center gap-6">
<a class="text-label-sm font-label-sm uppercase tracking-wider text-on-tertiary-fixed-variant dark:text-on-tertiary-fixed-variant hover:text-primary transition-colors duration-200 opacity-70 hover:opacity-100 transition-opacity" href="#">
                    Privacy Policy
                </a>
<a class="text-label-sm font-label-sm uppercase tracking-wider text-on-tertiary-fixed-variant dark:text-on-tertiary-fixed-variant hover:text-primary transition-colors duration-200 opacity-70 hover:opacity-100 transition-opacity" href="#">
                    Terms of Service
                </a>
<a class="text-label-sm font-label-sm uppercase tracking-wider text-on-tertiary-fixed-variant dark:text-on-tertiary-fixed-variant hover:text-primary transition-colors duration-200 opacity-70 hover:opacity-100 transition-opacity" href="#">
                    Contact
                </a>
</nav>
<div class="text-label-sm font-label-sm uppercase tracking-wider text-on-tertiary-fixed-variant dark:text-on-tertiary-fixed-variant opacity-70">
                © 2024 AUREUM. ALL RIGHTS RESERVED.
            </div>
</div>
</footer>
<!-- Lightweight JS for Password Toggle -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.querySelector('button[aria-label="Toggle Password Visibility"]');
            const passwordInput = document.getElementById('password');
            const iconSpan = toggleBtn.querySelector('.material-symbols-outlined');

            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                if (type === 'text') {
                    iconSpan.textContent = 'visibility_off';
                    iconSpan.setAttribute('data-icon', 'visibility_off');
                } else {
                    iconSpan.textContent = 'visibility';
                    iconSpan.setAttribute('data-icon', 'visibility');
                }
            });
            
            // Simple animation for progress bar on input focus
            const inputs = document.querySelectorAll('input:not([type="checkbox"])');
            const progressBar = document.querySelector('.bg-\\[\\#EAB308\\]');
            
            inputs.forEach((input, index) => {
                input.addEventListener('focus', () => {
                    const progress = ((index + 1) / inputs.length) * 100;
                    progressBar.style.width = `${progress}%`;
                });
            });
        });
    </script>
</body></html>
